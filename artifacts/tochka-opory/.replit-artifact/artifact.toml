kind = "web"
previewPath = "/"
title = "Точка опоры"
version = "1.0.0"
id = "artifacts/tochka-opory"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20681

[services.development]
run = "pnpm --filter @workspace/tochka-opory run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tochka-opory", "run", "build" ]
serve = "static"
publicDir = "artifacts/tochka-opory/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20681"
BASE_PATH = "/"
